<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #fff;
    }

    [data-view] { padding: 22px 18px; }

    /* ── Setup ── */
    #setup { text-align: center; }
    .icon { font-size: 34px; margin-bottom: 10px; }
    h1 { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
    .desc { font-size: 12px; color: #555; line-height: 1.5; margin-bottom: 16px; }
    #btn-setup {
      width: 100%; padding: 10px;
      background: #fe2c55; color: #fff;
      border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer;
    }
    #btn-setup:hover { background: #d9244a; }

    /* ── Settings ── */
    #settings { padding: 18px; }
    .settings-header {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 16px;
    }
    #btn-back {
      background: none; border: none; color: #555;
      font-size: 16px; cursor: pointer; padding: 0;
      line-height: 1;
    }
    #btn-back:hover { color: #fff; }
    .settings-title { font-size: 13px; font-weight: 600; }

    label {
      display: block; font-size: 11px; color: #555;
      text-transform: uppercase; letter-spacing: 0.05em;
      margin-bottom: 5px;
    }
    input[type="text"] {
      width: 100%; padding: 9px 10px;
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 7px; color: #fff; font-size: 13px; outline: none;
    }
    input[type="text"]:focus { border-color: #fe2c55; }
    .hint {
      margin: 6px 0 14px; font-size: 10px;
      color: #333; line-height: 1.6;
    }
    .hint code {
      background: #1a1a1a; border: 1px solid #2a2a2a;
      padding: 1px 4px; border-radius: 3px; color: #555; font-size: 9px;
    }

    .shortcut-row {
      display: flex; align-items: center; justify-content: space-between;
      background: #1a1a1a; border: 1px solid #1e1e1e;
      border-radius: 7px; padding: 8px 10px; margin-bottom: 14px;
    }
    .shortcut-label { font-size: 11px; color: #444; }
    .keys { display: flex; gap: 3px; }
    kbd {
      background: #222; border: 1px solid #333;
      border-radius: 3px; padding: 1px 6px;
      font-size: 10px; color: #888; font-family: inherit;
    }

    .actions { display: flex; gap: 6px; }
    #btn-save {
      flex: 1; padding: 9px;
      background: #fe2c55; color: #fff;
      border: none; border-radius: 7px;
      font-size: 12px; font-weight: 600; cursor: pointer;
    }
    #btn-save:hover { background: #d9244a; }
    #btn-shortcut {
      padding: 9px 10px;
      background: #1a1a1a; color: #666;
      border: 1px solid #2a2a2a; border-radius: 7px;
      font-size: 11px; cursor: pointer; white-space: nowrap;
    }
    #btn-shortcut:hover { color: #aaa; border-color: #333; }

    #toast {
      margin-top: 10px; padding: 8px 10px;
      background: #0d2b0d; border: 1px solid #1a4a1a;
      border-radius: 7px; color: #5cb85c; font-size: 11px;
      opacity: 0; transform: translateY(3px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }
    #toast.visible { opacity: 1; transform: none; }

    /* ── Downloading ── */
    #downloading { text-align: center; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid #1e1e1e; border-top-color: #fe2c55;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .dl-label { font-size: 12px; color: #555; }
  </style>
</head>
<body>

  <!-- Vista 1: sin configuración -->
  <div id="setup" data-view="setup" hidden>
    <div class="icon">⬇️</div>
    <h1>TikTok Downloader</h1>
    <p class="desc">Elige la carpeta de destino antes de descargar.</p>
    <button id="btn-setup">Configurar</button>
  </div>

  <!-- Vista 2: configuración inline -->
  <div id="settings" data-view="settings" hidden>
    <div class="settings-header">
      <button id="btn-back">←</button>
      <span class="settings-title">Configuración</span>
    </div>

    <label for="path-input">Carpeta de destino</label>
    <input type="text" id="path-input" placeholder="TikTok" autocomplete="off" spellcheck="false" />
    <p class="hint">
      Relativa a Descargas.<br/>
      <code>Descargas / TikTok / @usuario / tiktok_ID.mp4</code>
    </p>

    <div class="shortcut-row">
      <span class="shortcut-label">Atajo</span>
      <div class="keys"><kbd>Alt</kbd><kbd>D</kbd></div>
    </div>

    <div class="actions">
      <button id="btn-save">Guardar</button>
      <button id="btn-shortcut">Cambiar atajo</button>
    </div>
    <div id="toast">✅ Guardado</div>
  </div>

  <!-- Vista 3: descargando -->
  <div id="downloading" data-view="downloading" hidden>
    <div class="spinner"></div>
    <div class="dl-label">Descargando...</div>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
